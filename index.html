<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JRS France - Tableau de bord 2025</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=Playfair+Display:wght@400;600&display=swap');

:root {
  --bg: #FAFAF8;
  --bg-card: #FFFFFF;
  --bg-surface: #F3F2EE;
  --text-primary: #1A1A18;
  --text-secondary: #5E5D5A;
  --text-tertiary: #8A8984;
  --border: rgba(0,0,0,0.08);
  --accent-blue: #2563EB;
  --accent-teal: #0D9488;
  --accent-amber: #D97706;
  --accent-coral: #DC5228;
  --accent-purple: #7C3AED;
  --accent-green: #16A34A;
  --accent-pink: #DB2777;
  --accent-sky: #0EA5E9;
  --accent-indigo: #4F46E5;
  --accent-rose: #E11D48;
  --accent-lime: #65A30D;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
}

.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo-mark {
  width: 40px;
  height: 40px;
  background: var(--accent-coral);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 18px;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.header-subtitle {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.badge-year {
  background: var(--bg-surface);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

.main-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 0;
  height: calc(100vh - 80px);
}

.map-section {
  position: relative;
  min-height: 0;
}

#map {
  width: 100%;
  height: 100%;
  min-height: 400px;
  z-index: 1;
}

.sidebar {
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  overflow-y: auto;
}

.sidebar-section {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}

.sidebar-section:last-child { border-bottom: none; }

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-bottom: 14px;
}

.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.kpi-card {
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  transition: transform 0.15s, box-shadow 0.15s;
}

.kpi-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.kpi-card.wide { grid-column: 1 / -1; }

.kpi-value {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1.1;
}

.kpi-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.kpi-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  transition: all 0.15s;
  white-space: nowrap;
}

.chip:hover {
  border-color: var(--text-tertiary);
}

.chip.active {
  color: white;
  border-color: transparent;
}

.antenne-detail {
  display: none;
  padding: 20px 24px;
}

.antenne-detail.visible { display: block; }

.antenne-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
}

.antenne-programs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 10px;
}

.prog-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 500;
}

.antenne-stats {
  margin-top: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.antenne-stat {
  background: var(--bg-surface);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
}

.antenne-stat-value {
  font-size: 20px;
  font-weight: 600;
}

.antenne-stat-label {
  font-size: 11px;
  color: var(--text-secondary);
}

.close-detail {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--bg-surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-secondary);
}

.bar-chart-container {
  margin-top: 8px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.bar-label {
  font-size: 11px;
  color: var(--text-secondary);
  width: 90px;
  text-align: right;
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 18px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

.bar-count {
  font-size: 11px;
  color: var(--text-tertiary);
  width: 28px;
  flex-shrink: 0;
}

.leaflet-popup-content-wrapper {
  border-radius: var(--radius) !important;
  box-shadow: var(--shadow-lg) !important;
  padding: 0 !important;
}

.leaflet-popup-content {
  margin: 0 !important;
  font-family: 'DM Sans', sans-serif !important;
  min-width: 200px;
}

.popup-inner {
  padding: 14px 18px;
}

.popup-name {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 6px;
}

.popup-stat {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 2px;
}

.popup-programs {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.map-legend {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 14px 18px;
  box-shadow: var(--shadow-lg);
  z-index: 999;
  font-size: 12px;
  max-width: 240px;
}

.legend-title {
  font-weight: 500;
  margin-bottom: 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-tertiary);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.circle-marker {
  border: 2px solid white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  transition: transform 0.15s;
}

.circle-marker:hover {
  transform: scale(1.2);
}

@media (max-width: 900px) {
  .main-grid {
    grid-template-columns: 1fr;
    height: auto;
  }
  .sidebar {
    position: static;
    max-height: none;
    border-left: none;
    border-top: 1px solid var(--border);
  }
  #map { min-height: 50vh; height: 50vh; }
}
</style>
</head>

<div class="header">

const NATIONAL_KPIS = [
  { value: '34', label: 'Antennes actives', icon: '', color: 'var(--accent-coral)' },
  { value: '3 558', label: 'Benevoles engages', icon: '', color: 'var(--accent-purple)' },
  { value: '276', label: 'Personnes accueillies', sub: 'Welcome', color: 'var(--accent-blue)' },

];

let map, markers = [], activeFilter = null;

function init() {
  initMap();
  renderKPIs();
  renderFilters();
  renderBarChart();
  renderLegend();
  plotMarkers();
}

function initMap() {
  map = L.map('map', {
    center: [46.6, 2.5],
    zoom: 6,
    zoomControl: false,
    attributionControl: false
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
  setTimeout(function(){ map.invalidateSize(); }, 200);
  window.addEventListener('resize', function(){ map.invalidateSize(); });
}

function getMarkerSize(numPrograms) {
  if (numPrograms === 0) return 6;
  if (numPrograms <= 2) return 10;
  if (numPrograms <= 4) return 14;
  if (numPrograms <= 6) return 18;
  return 22;
}

function getMarkerColor(a) {
  if (activeFilter) {
    return a.programs.includes(activeFilter) ? PROGRAMS[activeFilter].color : '#ccc';
  }
  const n = a.programs.length;
  if (n === 0) return '#ccc';
  if (n <= 2) return '#93C5FD';
  if (n <= 4) return '#3B82F6';
  if (n <= 6) return '#1D4ED8';
  return '#1E3A5F';
}

function plotMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  ANTENNES.forEach(a => {
    if (a.programs.length === 0 && activeFilter) return;
    if (activeFilter && !a.programs.includes(activeFilter)) return;

    const size = getMarkerSize(a.programs.length);
    const color = getMarkerColor(a);

    const icon = L.divIcon({
      className: '',
      html: `<div class="circle-marker" style="width:${size*2}px;height:${size*2}px;border-radius:50%;background:${color};opacity:0.9;"></div>`,
      iconSize: [size*2, size*2],
      iconAnchor: [size, size]
    });

    const marker = L.marker([a.lat, a.lng], { icon }).addTo(map);

    const progBadges = a.programs.map(p =>
      `<span class="prog-badge" style="background:${PROGRAMS[p].color}15;color:${PROGRAMS[p].color}">${PROGRAMS[p].short}</span>`
    ).join('');

    marker.bindPopup(`
      <div class="popup-inner">
        <div class="popup-name">${a.name}</div>
        <div class="popup-stat">${a.accueillis} accueillis - ${a.nuitees.toLocaleString('fr')} nuitees</div>
        <div class="popup-stat">${a.lieux} lieux - ${a.accomp} accompagnateurs</div>
        <div class="popup-programs">${progBadges}</div>
      </div>
    `, { closeButton: false });

    marker.on('click', () => showDetail(a));
    markers.push(marker);
  });
}

function renderKPIs() {
  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = NATIONAL_KPIS.map(k => `
    <div class="kpi-card${k.wide ? ' wide' : ''}">
      <div class="kpi-value" style="color:${k.color}">${k.value}</div>
      <div class="kpi-label">${k.label}</div>
      ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
    </div>
  `).join('');
}

function renderFilters() {
  const container = document.getElementById('filter-chips');
  container.innerHTML = `<button class="chip ${!activeFilter ? 'active' : ''}" style="${!activeFilter ? 'background:var(--text-primary);color:white;' : ''}" onclick="setFilter(null)">Tous</button>` +
    Object.entries(PROGRAMS).map(([name, p]) =>
      `<button class="chip ${activeFilter === name ? 'active' : ''}" style="${activeFilter === name ? `background:${p.color};color:white;border-color:${p.color};` : ''}" onclick="setFilter('${name}')">${p.short}</button>`
    ).join('');
}

function setFilter(program) {
  activeFilter = program;
  renderFilters();
  plotMarkers();
  renderBarChart();
}

function renderBarChart() {
  const container = document.getElementById('bar-chart');
  let data = ANTENNES.filter(a => a.programs.length > 0).map(a => ({
    name: a.name,
    count: activeFilter ? (a.programs.includes(activeFilter) ? 1 : 0) : a.programs.length
  })).filter(d => d.count > 0).sort((a, b) => b.count - a.count).slice(0, 12);

  const max = Math.max(...data.map(d => d.count));

  container.innerHTML = data.map(d => {
    const pct = (d.count / max * 100);
    const color = activeFilter ? PROGRAMS[activeFilter].color : 'var(--accent-blue)';
    return `
      <div class="bar-row">
        <div class="bar-label">${d.name.length > 12 ? d.name.slice(0,11) + '.' : d.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${color};opacity:0.7;"></div>
        </div>
        <div class="bar-count">${d.count}</div>
      </div>
    `;
  }).join('');
}

function renderLegend() {
  const items = document.getElementById('legend-items');
  const sizes = [
    { label: '1-2 programmes', size: 10 },
    { label: '3-4 programmes', size: 14 },
    { label: '5-6 programmes', size: 18 },
    { label: '7+ programmes', size: 22 }
  ];
  items.innerHTML = sizes.map(s =>
    `<div class="legend-item">
      <div class="legend-dot" style="width:${s.size}px;height:${s.size}px;background:#3B82F6;"></div>
      <span>${s.label}</span>
    </div>`
  ).join('');
}

function showDetail(a) {
  const detail = document.getElementById('antenne-detail');
  const progBadges = a.programs.map(p =>
    `<span class="prog-badge" style="background:${PROGRAMS[p].color}20;color:${PROGRAMS[p].color}">${p}</span>`
  ).join('');

  let statsHtml = '';
  if (a.accueillis > 0) statsHtml += `<div class="antenne-stat"><div class="antenne-stat-value">${a.accueillis}</div><div class="antenne-stat-label">Accueillis Welcome</div></div>`;
  if (a.nuitees > 0) statsHtml += `<div class="antenne-stat"><div class="antenne-stat-value">${a.nuitees.toLocaleString('fr')}</div><div class="antenne-stat-label">Nuitees</div></div>`;
  if (a.lieux > 0) statsHtml += `<div class="antenne-stat"><div class="antenne-stat-value">${a.lieux}</div><div class="antenne-stat-label">Lieux d'accueil</div></div>`;
  if (a.accomp > 0) statsHtml += `<div class="antenne-stat"><div class="antenne-stat-value">${a.accomp}</div><div class="antenne-stat-label">Accompagnateurs</div></div>`;
  if (a.juridique) statsHtml += `<div class="antenne-stat"><div class="antenne-stat-value">${a.juridique}</div><div class="antenne-stat-label">Suivis juridiques</div></div>`;
  if (a.fle_eleves) statsHtml += `<div class="antenne-stat"><div class="antenne-stat-value">${a.fle_eleves}</div><div class="antenne-stat-label">Eleves FLE</div></div>`;

  detail.innerHTML = `
    <button class="close-detail" onclick="closeDetail()">&times;</button>
    <div class="antenne-name">${a.name}</div>
    <div style="font-size:12px;color:var(--text-secondary);">${a.programs.length} programme${a.programs.length > 1 ? 's' : ''} actif${a.programs.length > 1 ? 's' : ''}</div>
    <div class="antenne-programs">${progBadges}</div>
    <div class="antenne-stats">${statsHtml}</div>
  `;
  detail.classList.add('visible');
}

function closeDetail() {
  document.getElementById('antenne-detail').classList.remove('visible');
}

init();
</script>
</body>
</html>
