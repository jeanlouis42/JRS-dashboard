<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=Playfair+Display:wght@400;600&display=swap');
:root{--bg:#FAFAF8;--bg2:#FFF;--bg3:#F3F2EE;--tp:#1A1A18;--ts:#5E5D5A;--tt:#8A8984;--bd:rgba(0,0,0,.08);--blue:#2563EB;--teal:#0D9488;--amber:#D97706;--coral:#DC5228;--purple:#7C3AED;--green:#16A34A;--pink:#DB2777;--sky:#0EA5E9;--lime:#65A30D;--rose:#E11D48;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tp);line-height:1.5}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--coral);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-weight:600;font-size:14px}
.hdr h1{font-family:'Playfair Display',serif;font-size:17px;font-weight:600}
.hdr-sub{font-size:10px;color:var(--tt)}
.badge{background:var(--bg3);padding:3px 10px;border-radius:16px;font-size:10px;font-weight:500;color:var(--ts)}
.grid{display:grid;grid-template-columns:1fr 340px;height:calc(100vh - 52px)}
.map-s{position:relative;min-height:0}
#map{width:100%;height:100%;min-height:400px;z-index:1}
.sb{background:var(--bg2);border-left:1px solid var(--bd);overflow-y:auto}
.sec{padding:10px 14px;border-bottom:1px solid var(--bd)}.sec:last-child{border-bottom:none}
.st{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--tt);font-weight:500;margin-bottom:6px}
.vtog{display:flex;background:var(--bg3);border-radius:6px;padding:2px;gap:1px;flex-wrap:wrap}
.vb{flex:1;padding:5px 2px;border:none;border-radius:4px;background:transparent;font-family:inherit;font-size:9px;font-weight:500;color:var(--tt);cursor:pointer;transition:all .12s;text-align:center;white-space:nowrap;min-width:55px}
.vb:hover{color:var(--ts)}.vb.on{background:var(--bg2);color:var(--tp);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.kpi-header{display:flex;justify-content:space-between;align-items:center}
.kpi-reset{font-size:8px;color:var(--blue);cursor:pointer;border:none;background:none;font-family:inherit;font-weight:500;padding:2px 6px;border-radius:10px;display:none}
.kpi-reset:hover{background:rgba(37,99,235,.08)}
.kpi-reset.vis{display:inline-block}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.kc{background:var(--bg3);border-radius:var(--rs);padding:8px 10px;transition:all .2s}
.kc.w{grid-column:1/-1}
.kv{font-size:17px;font-weight:600;letter-spacing:-.4px;line-height:1.1}
.kl{font-size:8px;color:var(--ts);margin-top:1px}
.ks{font-size:7px;color:var(--tt);margin-top:1px}
.fc{display:flex;flex-wrap:wrap;gap:3px}
.ch{padding:3px 7px;border-radius:14px;font-size:8px;font-weight:500;cursor:pointer;border:1.5px solid var(--bd);background:transparent;color:var(--ts);transition:all .12s;white-space:nowrap;font-family:inherit}
.ch:hover{border-color:var(--tt)}.ch.on{color:#fff;border-color:transparent}
.bc{margin-top:2px}
.br{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.bl{font-size:8px;color:var(--ts);width:70px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btr{flex:1;height:12px;background:var(--bg);border-radius:2px;overflow:hidden}
.bfi{height:100%;border-radius:2px;transition:width .4s}
.bn{font-size:8px;color:var(--tt);width:36px;flex-shrink:0;font-weight:500}
.ad{display:none;padding:12px 14px}.ad.vis{display:block}
.an{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;margin-bottom:1px}
.ap{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}
.pb{font-size:7px;padding:2px 5px;border-radius:8px;font-weight:500}
.as{margin-top:7px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.asi{background:var(--bg3);padding:5px 8px;border-radius:var(--rs)}
.asv{font-size:14px;font-weight:600}.asl{font-size:7px;color:var(--ts)}
.cb{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;border:none;background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ts)}
.leaflet-popup-content-wrapper{border-radius:var(--r)!important;box-shadow:0 4px 16px rgba(0,0,0,.08)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;font-family:'DM Sans',sans-serif!important;min-width:210px}
.pi{padding:9px 12px}.pn{font-weight:600;font-size:12px;margin-bottom:3px}
.pst{font-size:9px;color:var(--ts);margin-bottom:1px}
.pp{margin-top:3px;display:flex;flex-wrap:wrap;gap:2px}
.ml{position:absolute;bottom:10px;left:10px;background:var(--bg2);border-radius:var(--r);padding:8px 11px;box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:999;font-size:9px;max-width:200px}
.mlt{font-weight:500;margin-bottom:3px;font-size:8px;text-transform:uppercase;letter-spacing:.7px;color:var(--tt)}
.mli{display:flex;align-items:center;gap:5px;margin-bottom:2px;color:var(--ts);font-size:9px}
.ld{border-radius:50%;flex-shrink:0}
.cm{border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .12s}.cm:hover{transform:scale(1.15)}
.score-row{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.score-label{font-size:8px;color:var(--ts);width:60px;text-align:right;flex-shrink:0}
.score-dots{display:flex;gap:2px;flex:1}
.score-dot{width:12px;height:12px;border-radius:2px;background:var(--bg);border:1px solid var(--bd)}
.score-dot.on{border-color:transparent}
.score-val{font-size:8px;font-weight:600;width:14px;text-align:center;flex-shrink:0}
.cdm-tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:8px;font-weight:500;margin-bottom:4px}
.ts-big{font-size:20px;font-weight:600;letter-spacing:-.4px}
.ts-label{font-size:8px;color:var(--ts)}
@media(max-width:900px){.grid{grid-template-columns:1fr;height:auto}.sb{border-left:none;border-top:1px solid var(--bd)}#map{min-height:50vh;height:50vh}}
</style>

var map,markers=[],aF=null,cV='programmes',selA=null;

function init(){initMap();rKPI();rF();rBar();rLeg();plot()}

function initMap(){
  map=L.map('map',{center:[46.6,2.5],zoom:6,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  setTimeout(function(){map.invalidateSize()},200);
  window.addEventListener('resize',function(){map.invalidateSize()});
}

function gv(a){
  if(cV==='beneficiaires'){if(aF)return a.b[aF]||0;return a.tb}
  if(cV==='benevoles'){if(aF)return a.v[aF]||0;return a.tv}
  if(cV==='scoring')return a.sc.total;
  return a.p.length;
}
function gr(v){
  if(cV==='scoring')return 14;
  if(cV==='cdm')return 12;
  if(cV==='programmes'){if(v===0)return 5;if(v<=2)return 8;if(v<=4)return 12;if(v<=6)return 16;return 20}
  if(v===0)return 4;var mx=Math.max.apply(null,D.map(gv));if(mx===0)return 4;
  return Math.max(6,Math.min(32,6+Math.sqrt(v/mx)*26));
}
function scCol(v){if(v>=4)return'#16A34A';if(v>=3.5)return'#65A30D';if(v>=3)return'#D97706';if(v>=2.5)return'#F59E0B';if(v>=2)return'#EA580C';return'#DC2626'}
function gc(a){
  if(cV==='scoring')return scCol(a.sc.total);
  if(cV==='cdm')return CDM_COLORS[a.cdm]||'#ccc';
  if(aF)return a.p.indexOf(aF)>=0?PR[aF].c:'#ddd';
  if(cV==='beneficiaires')return'#7C3AED';if(cV==='benevoles')return'#0D9488';
  var n=a.p.length;if(n===0)return'#ddd';if(n<=2)return'#93C5FD';if(n<=4)return'#3B82F6';if(n<=6)return'#1D4ED8';return'#1E3A5F';
}

function plot(){
  markers.forEach(function(m){map.removeLayer(m)});markers=[];
  D.forEach(function(a){
    if(!a.p.length&&(aF||cV==='scoring'))return;if(aF&&a.p.indexOf(aF)<0)return;
    var v=gv(a),r=gr(v),c=gc(a);
    if(cV!=='programmes'&&cV!=='scoring'&&cV!=='cdm'&&v===0&&aF)return;
    var sn=(cV==='scoring');
    var label='';
    if(sn)label=a.sc.total.toFixed(1);
    else if(r>13&&cV!=='programmes'&&cV!=='cdm')label=v.toLocaleString('fr');
    var fs=sn?9:(label?Math.max(8,Math.min(10,r/2.2)):0);
    var h='<div class="cm" style="width:'+r*2+'px;height:'+r*2+'px;border-radius:50%;background:'+c+';opacity:.88;display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+fs+'px;font-weight:600;line-height:1">'+label+'</div>';
    var ic=L.divIcon({className:'',html:h,iconSize:[r*2,r*2],iconAnchor:[r,r]});
    var m=L.marker([a.lat,a.lng],{icon:ic}).addTo(map);
    var pb=a.p.map(function(p){return'<span class="pb" style="background:'+PR[p].c+'15;color:'+PR[p].c+'">'+PR[p].s+'</span>'}).join('');
    m.bindPopup('<div class="pi"><div class="pn">'+a.n+'</div><div class="pst">CdM : '+a.cdm+' - Score : '+a.sc.total.toFixed(1)+'/5</div><div class="pst"><b>'+a.tb+'</b> benef. - <b>'+a.tv+'</b> benev.</div><div class="pst">'+a.acc+' accueillis - '+a.nuit.toLocaleString('fr')+' nuitees</div><div class="pp">'+pb+'</div></div>',{closeButton:false});
    m.on('click',function(){selA=a;rKPI();showD(a)});markers.push(m);
  });
}

function rKPI(){
  var el=document.getElementById('kg'),tl=document.getElementById('kpi-title'),rb=document.getElementById('kpi-reset');
  if(selA){
    var a=selA;
    tl.textContent=a.n;
    rb.classList.add('vis');
    el.innerHTML=[
      {v:a.p.length,l:'Programmes actifs',c:'var(--blue)'},
      {v:a.sc.total.toFixed(1)+'/5',l:'Score global',c:scCol(a.sc.total)},
      {v:a.tb,l:'Beneficiaires',c:'var(--purple)'},
      {v:a.tv,l:'Benevoles',c:'var(--teal)'},
      {v:a.acc,l:'Accueillis Welcome',c:'var(--blue)'},
      {v:a.nuit.toLocaleString('fr'),l:'Nuitees Welcome',c:'var(--blue)'},
      {v:a.lx,l:"Lieux d'accueil",s:a.lxe+' ayant accueilli',c:'var(--sky)'},
      {v:a.ac,l:'Accompagnateurs',c:'var(--green)'}
    ].map(function(k){return'<div class="kc"><div class="kv" style="color:'+k.c+'">'+k.v+'</div><div class="kl">'+k.l+'</div>'+(k.s?'<div class="ks">'+k.s+'</div>':'')+'</div>'}).join('');
  } else {
    tl.textContent='Chiffres cles nationaux';
    rb.classList.remove('vis');
    el.innerHTML=[
      {v:'34',l:'Antennes actives',c:'var(--coral)'},{v:'3 558',l:'Benevoles engages',c:'var(--teal)'},
      {v:'276',l:'Accueillis Welcome',c:'var(--blue)'},{v:'35 674',l:'Nuitees Welcome',c:'var(--blue)'},
      {v:'1 090',l:"Lieux d'accueil",s:'702 ayant accueilli',c:'var(--sky)'},{v:'182',l:'Accompagnateurs',s:'71% retraites',c:'var(--green)'},
      {v:'505',l:'Suivis juridiques',s:'11 antennes',c:'var(--coral)'},{v:'390',l:'Eleves FLE',s:'126 benevoles',c:'var(--amber)'},
      {v:'1 761',l:'Participants JRS Jeunes',s:'921 activites',c:'var(--purple)'},{v:'1 617',l:'Personnes sensibilisees',s:'48 interventions',c:'var(--lime)'},
      {v:'3 602',l:'Accueillis Oasis',s:'180 jours, S1',w:1,c:'var(--pink)'}
    ].map(function(k){return'<div class="kc'+(k.w?' w':'')+'"><div class="kv" style="color:'+k.c+'">'+k.v+'</div><div class="kl">'+k.l+'</div>'+(k.s?'<div class="ks">'+k.s+'</div>':'')+'</div>'}).join('');
  }
}

function resetKPI(){selA=null;rKPI();document.getElementById('ad').classList.remove('vis')}

function rF(){
  var el=document.getElementById('fc');
  var h='<button class="ch'+(!aF?' on':'')+'" style="'+(!aF?'background:var(--tp);color:#fff;':'')+'" onclick="setFi(null)">Tous</button>';
  Object.keys(PR).forEach(function(n){var p=PR[n];h+='<button class="ch'+(aF===n?' on':'')+'" style="'+(aF===n?'background:'+p.c+';color:#fff;border-color:'+p.c+';':'')+'" onclick="setFi(\''+n+'\')">'+p.s+'</button>'});
  el.innerHTML=h;
}

function setFi(p){aF=p;rF();plot();rBar()}
function setV(v){cV=v;document.querySelectorAll('.vb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-v')===v)});rLeg();plot();rBar()}

function rBar(){
  var el=document.getElementById('bc'),tl=document.getElementById('bt');
  var lbl,color;
  if(cV==='beneficiaires'){lbl='Beneficiaires par antenne';color='#7C3AED'}
  else if(cV==='benevoles'){lbl='Benevoles par antenne';color='#0D9488'}
  else if(cV==='scoring'){lbl='Score par antenne';color='#D97706'}
  else{lbl='Programmes par antenne';color='#2563EB'}
  if(aF)color=PR[aF].c;tl.textContent=lbl;
  var data=D.filter(function(a){return a.p.length>0}).map(function(a){return{name:a.n,count:gv(a),sc:a.sc.total,cdm:a.cdm}});
  if(cV==='scoring')data.sort(function(a,b){return b.sc-a.sc});
  else data=data.filter(function(d){return d.count>0}).sort(function(a,b){return b.count-a.count});
  data=data.slice(0,15);
  var mx=cV==='scoring'?5:Math.max.apply(null,data.map(function(d){return d.count}));
  el.innerHTML=data.map(function(d){
    var val=cV==='scoring'?d.sc:d.count;
    var pct=val/mx*100;
    var c=cV==='scoring'?scCol(d.sc):(cV==='cdm'?CDM_COLORS[d.cdm]:color);
    var dn=d.name.length>13?d.name.slice(0,12)+'.':d.name;
    var dv=cV==='scoring'?d.sc.toFixed(1):d.count.toLocaleString('fr');
    return'<div class="br"><div class="bl">'+dn+'</div><div class="btr"><div class="bfi" style="width:'+pct+'%;background:'+c+';opacity:.7"></div></div><div class="bn">'+dv+'</div></div>';
  }).join('');
}

function rLeg(){
  var el=document.getElementById('ml');
  if(cV==='programmes')el.innerHTML='<div class="mlt">Taille = nb de programmes</div>'+[{l:'1-2',s:8},{l:'3-4',s:12},{l:'5-6',s:16},{l:'7+',s:20}].map(function(i){return'<div class="mli"><div class="ld" style="width:'+i.s+'px;height:'+i.s+'px;background:#3B82F6"></div>'+i.l+' prog.</div>'}).join('');
  else if(cV==='beneficiaires')el.innerHTML='<div class="mlt">Taille = beneficiaires</div><div class="mli" style="font-size:8px;color:var(--tt)">Cercle proportionnel</div>';
  else if(cV==='benevoles')el.innerHTML='<div class="mlt">Taille = benevoles</div><div class="mli" style="font-size:8px;color:var(--tt)">Cercle proportionnel</div>';
  else if(cV==='scoring')el.innerHTML='<div class="mlt">Couleur = score global /5</div>'+[{l:'4+ Solide',c:'#16A34A'},{l:'3-4 Correct',c:'#D97706'},{l:'2-3 Fragile',c:'#F59E0B'},{l:'<2 Critique',c:'#DC2626'}].map(function(i){return'<div class="mli"><div class="ld" style="width:10px;height:10px;background:'+i.c+'"></div>'+i.l+'</div>'}).join('');
  else if(cV==='cdm')el.innerHTML='<div class="mlt">Couleur = charge de mission</div>'+Object.keys(CDM_COLORS).filter(function(k){return k!=='-'}).map(function(k){return'<div class="mli"><div class="ld" style="width:10px;height:10px;background:'+CDM_COLORS[k]+'"></div>'+k+'</div>'}).join('');
}

function showD(a){
  var d=document.getElementById('ad');
  var pb=a.p.map(function(p){return'<span class="pb" style="background:'+PR[p].c+'20;color:'+PR[p].c+'">'+PR[p].s+'</span>'}).join('');
  var sh='<div class="asi"><div class="asv" style="color:var(--purple)">'+a.tb+'</div><div class="asl">Beneficiaires</div></div>';
  sh+='<div class="asi"><div class="asv" style="color:var(--teal)">'+a.tv+'</div><div class="asl">Benevoles</div></div>';
  if(a.acc>0)sh+='<div class="asi"><div class="asv">'+a.acc+'</div><div class="asl">Accueillis Welcome</div></div>';
  if(a.nuit>0)sh+='<div class="asi"><div class="asv">'+a.nuit.toLocaleString('fr')+'</div><div class="asl">Nuitees</div></div>';
  // Scoring
  var dims=[{k:'welcome',l:'Welcome'},{k:'vitalite',l:'Vitalite'},{k:'coordo',l:'Coordination'},{k:'acteurs',l:'Partenaires'},{k:'prog',l:'Nb prog.'}];
  var scH='<div style="margin-top:8px"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:6px"><div class="ts-big" style="color:'+scCol(a.sc.total)+'">'+a.sc.total.toFixed(1)+'</div><div class="ts-label">/ 5 - Score global</div></div>';
  dims.forEach(function(dim){var val=a.sc[dim.k];var dots='';for(var i=1;i<=5;i++){var f=i<=Math.round(val);dots+='<div class="score-dot'+(f?' on':'')+'" style="'+(f?'background:'+scCol(val):'')+'"></div>'}scH+='<div class="score-row"><div class="score-label">'+dim.l+'</div><div class="score-dots">'+dots+'</div><div class="score-val" style="color:'+scCol(val)+'">'+Math.round(val)+'</div></div>'});
  scH+='</div>';
  // Breakdown
  var bk='<div style="margin-top:8px"><div style="font-size:7px;text-transform:uppercase;letter-spacing:1px;color:var(--tt);margin-bottom:3px">Detail par programme</div>';
  bk+='<div style="display:flex;gap:2px;font-size:7px;color:var(--tt);margin-bottom:2px;padding-left:10px"><span style="flex:1"></span><span style="width:36px;text-align:right">benef.</span><span style="width:36px;text-align:right">benev.</span></div>';
  a.p.forEach(function(p){var be=a.b[p]||0,vo=a.v[p]||0;bk+='<div style="display:flex;align-items:center;gap:3px;margin-bottom:1px;font-size:8px"><span style="width:5px;height:5px;border-radius:50%;background:'+PR[p].c+';flex-shrink:0"></span><span style="flex:1;color:var(--ts)">'+PR[p].s+'</span><span style="color:var(--purple);font-weight:500;width:36px;text-align:right">'+be+'</span><span style="color:var(--teal);font-weight:500;width:36px;text-align:right">'+vo+'</span></div>'});
  bk+='</div>';
  d.innerHTML='<button class="cb" onclick="closeD()">&times;</button><div class="cdm-tag" style="background:'+CDM_COLORS[a.cdm]+'18;color:'+CDM_COLORS[a.cdm]+'">CdM : '+a.cdm+'</div><div class="an">'+a.n+'</div><div style="font-size:9px;color:var(--ts)">'+a.p.length+' programme'+(a.p.length>1?'s':'')+' actif'+(a.p.length>1?'s':'')+'</div><div class="ap">'+pb+'</div><div class="as">'+sh+'</div>'+scH+bk;
  d.classList.add('vis');
}

function closeD(){document.getElementById('ad').classList.remove('vis');selA=null;rKPI()}
init();
</script>
